<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lidia</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f6f1e7;
      color: #1c1c1c;
      font-family: 'Inter', sans-serif;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 80px;
      margin: 0;
      font-weight: 500;
    }

    p {
      max-width: 600px;
      font-size: 18px;
      opacity: 0.75;
      line-height: 1.6;
    }

    .btn {
      margin-top: 35px;
      padding: 14px 28px;
      border: 1px solid #000;
      border-radius: 999px;
      text-decoration: none;
      color: #000;
      transition: 0.3s;
    }

    .btn:hover {
      background: #000;
      color: #fff;
    }

    .meta {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <h1>Lidia</h1>

    <p>
      A private cultural connection between mountains, silence and coastal Italy.  
      Not a service — a conversation.
    </p>

    <a class="btn" href="https://matrix.to/#/#lidia-access:matrix.org">
      Enter Private Channel
    </a>

    <div class="meta">
      Bolzano / South Tyrol • Quiet Luxury • Human Connection
    </div>

  </div>

</body>
</html>
