<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPOCKET | VIBE TERMINAL</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; border-bottom: 1px solid #00ff41; text-align: center; background: #000; box-shadow: 0 0 10px #00ff41; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { padding: 10px; border: 1px solid #00ff41; background: rgba(0,255,65,0.1); border-radius: 4px; animation: blink 0.1s; }
        @keyframes blink { from { opacity: 0; } to { opacity: 1; } }
        footer { padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid #00ff41; }
        input { flex: 1; background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; font-size: 16px; }
        button { background: #00ff41; color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #fff; }
    </style>
</head>
<body>
    <header><h1>SYSTEM VIBE v1.0 | STATUS: ONLINE</h1></header>
    <div id="chat-window">ZALOGOWANO POMYŚLNIE. TERMINAL LOKALNY GOTOWY...</div>
    <footer>
        <input type="text" id="msgInput" placeholder="Wpisz wiadomość..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">SEND</button>
    </footer>

    <script>
        // System zapisu w pamięci przeglądarki
        let messages = JSON.parse(localStorage.getItem('vibe_msgs') || '[]');

        function render() {
            const win = document.getElementById('chat-window');
            if (messages.length > 0) {
                win.innerHTML = '';
                messages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.textContent = `[OPERATOR]: ${m}`;
                    win.appendChild(div);
                });
            }
            win.scrollTop = win.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            
            messages.push(input.value);
            localStorage.setItem('vibe_msgs', JSON.stringify(messages));
            input.value = '';
            render();
        }

        // Pierwsze wyświetlenie
        render();
    </script>
</body>
</html>
