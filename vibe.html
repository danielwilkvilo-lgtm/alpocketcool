<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPOCKET | VIBE FINAL</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; border-bottom: 2px solid #00ff41; text-align: center; background: #000; box-shadow: 0 0 15px rgba(0,255,65,0.3); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background: #050505; }
        .msg { padding: 8px 12px; border: 1px solid #00ff41; background: rgba(0,255,65,0.05); border-radius: 4px; font-size: 14px; line-height: 1.4; }
        .time { color: #888; font-size: 0.8em; margin-right: 10px; }
        footer { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid #333; }
        input { flex: 1; background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; font-family: inherit; }
        .btn { padding: 10px 20px; cursor: pointer; font-weight: bold; font-family: inherit; border: 1px solid #00ff41; transition: 0.2s; }
        .send-btn { background: #00ff41; color: #000; }
        .clear-btn { background: transparent; color: #ff4141; border-color: #ff4141; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>
    <header><h1>SYSTEM VIBE v1.1 | STATUS: ULTIMATE</h1></header>
    <div id="chat-window">TERMINAL GOTOWY. WPISZ POLECENIE...</div>
    <footer>
        <button class="btn clear-btn" onclick="clearLogs()">CLR</button>
        <input type="text" id="msgInput" placeholder="Napisz coś..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="btn send-btn" onclick="sendMessage()">SEND</button>
    </footer>

    <script>
        let messages = JSON.parse(localStorage.getItem('vibe_msgs') || '[]');

        function render() {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            if (messages.length === 0) {
                win.innerHTML = '<div style="color:#555">Brak logów w pamięci.</div>';
            } else {
                messages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = `<span class="time">${m.t}</span><b>[OPERATOR]:</b> ${m.text}`;
                    win.appendChild(div);
                });
            }
            win.scrollTop = win.scrollHeight;
            document.getElementById('msgInput').focus(); // Kursor zawsze gotowy do pisania
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            
            messages.push({ text: input.value, t: timeStr });
            localStorage.setItem('vibe_msgs', JSON.stringify(messages));
            input.value = '';
            render();
        }

        function clearLogs() {
            if(confirm("Wyczyścić wszystkie logi?")) {
                messages = [];
                localStorage.removeItem('vibe_msgs');
                render();
            }
        }

        render();
    </script>
</body>
</html>
