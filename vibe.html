<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPOCKET | VIBE</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 20px; border-bottom: 1px solid #00ff41; text-align: center; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 15px; border-radius: 5px; max-width: 80%; border: 1px solid #00ff41; background: rgba(0,255,65,0.05); }
        .msg.me { align-self: flex-end; border-color: #00bcff; color: #00bcff; }
        footer { padding: 20px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: transparent; border: 1px solid #00ff41; color: #fff; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:hover { background: #00bcff; }
    </style>
</head>
<body>
    <header><h1>SYSTEM VIBE | MATRIX CONNECTED</h1></header>
    <div id="chat-window"></div>
    <footer>
        <input type="text" id="msgInput" placeholder="Napisz do sytemu...">
        <button onclick="sendMessage()">SEND</button>
    </footer>

    <script>
        const HS = "https://matrix-client.matrix.org";
        const TOKEN = "mat_OyjqiO6FzHi3ed9bB8sr80pY20H0jK_Xba053";
        const ROOM = "!kLoBymDOXwbLbAxcDu:matrix.org";

        async function fetchMessages() {
            try {
                const res = await fetch(`${HS}/_matrix/client/r0/rooms/${ROOM}/messages?limit=20`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await res.json();
                const chat = document.getElementById('chat-window');
                chat.innerHTML = '';
                data.chunk.reverse().forEach(msg => {
                    if(msg.content.body) {
                        const div = document.createElement('div');
                        div.className = 'msg';
                        div.textContent = `${msg.sender.split(':')[0].substring(1)}: ${msg.content.body}`;
                        chat.appendChild(div);
                    }
                });
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { console.error("Błąd połączenia:", e); }
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value;
            if(!text) return;
            
            await fetch(`${HS}/_matrix/client/r0/rooms/${ROOM}/send/m.room.message`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ "msgtype": "m.text", "body": text })
            });
            input.value = '';
            fetchMessages();
        }

        setInterval(fetchMessages, 3000);
        fetchMessages();
    </script>
</body>
</html>
